<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.gpteng.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://*.supabase.in https://ai.gateway.lovable.dev https://openrouter.ai https://bbqs.dev https://api.reporter.nih.gov https://eutils.ncbi.nlm.nih.gov wss://*.supabase.co; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://medit.dandiarchive.org https://calendar.google.com; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>BrainBBQS — Brain Behavior Quantification and Synchronization Consortium</title>
    <meta name="description" content="BrainBBQS (Brain Behavior Quantification and Synchronization) is an NIH-funded consortium advancing computational neuroscience through shared tools, data standards, and cross-species behavioral analysis." />
    <meta name="keywords" content="BrainBBQS, BBQS, Brain Behavior Quantification, Brain Behavior Synchronization, NIH BRAIN Initiative, computational neuroscience, cross-species behavior, neuroethology, neural data standards" />
    <meta name="author" content="BBQS Consortium" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://app.brain-bbqs.org/" />

    <!-- Apply saved theme before paint to prevent light flash. Default = dark. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('bbqs-theme') || 'dark';
          var resolved = t === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : t;
          var root = document.documentElement;
          root.classList.toggle('dark', resolved === 'dark');
          root.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>

    <meta property="og:site_name" content="BrainBBQS" />
    <meta property="og:title" content="BrainBBQS — Brain Behavior Quantification and Synchronization Consortium" />
    <meta property="og:description" content="NIH-funded consortium advancing computational neuroscience through shared tools, data standards, and cross-species behavioral analysis." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.brain-bbqs.org/" />
    <meta property="og:image" content="https://app.brain-bbqs.org/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BrainBBQS — Brain Behavior Quantification and Synchronization" />
    <meta name="twitter:description" content="NIH-funded consortium for computational neuroscience research." />
    <meta name="twitter:image" content="https://app.brain-bbqs.org/og-image.png" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ResearchOrganization",
      "name": "Brain Behavior Quantification and Synchronization (BBQS)",
      "alternateName": ["BrainBBQS", "BBQS", "BBQS Consortium"],
      "url": "https://app.brain-bbqs.org",
      "logo": "https://app.brain-bbqs.org/favicon.png",
      "description": "NIH-funded consortium advancing computational neuroscience through shared tools and cross-species behavioral analysis.",
      "funder": {
        "@type": "Organization",
        "name": "National Institutes of Health (NIH)"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BrainBBQS",
      "alternateName": "Brain Behavior Quantification and Synchronization",
      "url": "https://app.brain-bbqs.org",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://app.brain-bbqs.org/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
