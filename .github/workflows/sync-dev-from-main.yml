name: Sync dev from main

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dev is behind main
        id: check
        run: |
          git fetch origin dev
          BEHIND=$(git rev-list --count origin/dev..origin/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

      - name: Create sync PR
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a sync PR already exists
          EXISTING=$(gh pr list --repo "$GITHUB_REPOSITORY" --head main --base dev --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Sync PR #$EXISTING already exists, skipping"
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Sync dev from main" \
            --body "$(cat <<'EOF'
          Automated PR to keep `dev` up to date with `main`.

          This was triggered by a merge to `main`. Please review and merge to rebase `dev`.
          EOF
          )" \
            --head main \
            --base dev \
            --label "sync"
