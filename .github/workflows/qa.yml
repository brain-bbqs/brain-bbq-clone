name: QA – Smoke & Visual Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Decrypt migrations
        run: bash scripts/decrypt-migrations.sh
        env:
          MIGRATIONS_KEY: ${{ secrets.MIGRATIONS_KEY }}

      - name: Push database migrations
        run: supabase db push --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: vpexxhfpvghlejljwpvt

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start preview server
        run: npx vite preview --port 8080 &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null && break || sleep 2
          done

      - name: Generate baseline snapshots if missing
        run: npx playwright test --project=chromium --update-snapshots
        env:
          BASE_URL: http://localhost:8080
          CI: true
          CI_AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:8080
          CI: true
          CI_AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: test-results/
          retention-days: 14

      - name: Upload updated snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: updated-snapshots
          path: e2e/**/*-snapshots/
          retention-days: 14
