name: QA – Smoke & Visual Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mark QA as running on the PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lovable-playwright
          message: |
            ### 🧪 Playwright QA — ⏳ running

            Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            Commit: `${{ github.event.pull_request.head.sha }}`

            The full HTML report will be attached as the `playwright-report`
            artifact on the run page once the job finishes.

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start preview server
        run: npx vite preview --port 8080 &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null && break || sleep 2
          done

      - name: Generate baseline snapshots if missing
        run: npx playwright test --project=chromium --update-snapshots
        env:
          BASE_URL: http://localhost:8080
          CI: true
          CI_AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:8080
          CI: true
          CI_AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: test-results/
          retention-days: 14

      - name: Upload updated snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: updated-snapshots
          path: e2e/**/*-snapshots/
          retention-days: 14

      - name: Update PR with QA result
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lovable-playwright
          message: |
            ### 🧪 Playwright QA — ${{ job.status == 'success' && '✅ passed' || (job.status == 'failure' && '❌ failed' || 'ℹ️ ' ) }}${{ job.status != 'success' && job.status != 'failure' && job.status || '' }}

            Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            Commit: `${{ github.event.pull_request.head.sha }}`

            - 📄 [HTML report (artifact)](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) — `playwright-report`
            ${{ job.status == 'failure' && format('- 🖼 [Screenshot diffs](${0}/{1}/actions/runs/{2}#artifacts) — `screenshot-diffs`', github.server_url, github.repository, github.run_id) || '' }}

            <sub>Auto-updated by `.github/workflows/qa.yml`.</sub>
