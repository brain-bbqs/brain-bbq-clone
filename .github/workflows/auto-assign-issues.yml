name: Auto Assign Bug Issues

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'bug')
    steps:
      - name: Assign issue to maintainers and ping Claude
        uses: actions/github-script@v7
        with:
          script: |
            const assignees = ['Sulstice', 'nader'];

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '@claude please investigate and propose a fix for this bug.'
            });

            console.log(`Assigned issue #${context.issue.number} to ${assignees.join(', ')} and tagged Claude`);
