name: Sync staging schema

# Pushes any new migrations from main to the staging Supabase project, then
# triggers a fresh fake-data seed. Dormant until the following repo secrets
# are configured:
#
#   STAGING_SUPABASE_PROJECT_REF       — staging project ref (xxxx in xxxx.supabase.co)
#   STAGING_SUPABASE_ACCESS_TOKEN      — personal access token from supabase.com/dashboard/account/tokens
#   STAGING_SEED_FUNCTION_URL          — https://<ref>.supabase.co/functions/v1/seed-staging-fakes
#   STAGING_SEED_TOKEN                 — shared secret matching STAGING_SEED_TOKEN env on staging project
#   STAGING_ANON_KEY                   — staging project anon key (for the function call)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/seed-staging-fakes/**'
      - 'supabase/functions/staging-fake-login/**'
  workflow_dispatch:
    inputs:
      reseed:
        description: 'Re-run seed function after migrations'
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ vars.STAGING_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=0
          for s in STAGING_SUPABASE_PROJECT_REF STAGING_SUPABASE_ACCESS_TOKEN STAGING_SEED_FUNCTION_URL STAGING_SEED_TOKEN STAGING_ANON_KEY; do
            if [ -z "${!s}" ]; then echo "::error::Missing secret $s"; missing=1; fi
          done
          [ $missing -eq 0 ] || exit 1
        env:
          STAGING_SUPABASE_PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
          STAGING_SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          STAGING_SEED_FUNCTION_URL: ${{ secrets.STAGING_SEED_FUNCTION_URL }}
          STAGING_SEED_TOKEN: ${{ secrets.STAGING_SEED_TOKEN }}
          STAGING_ANON_KEY: ${{ secrets.STAGING_ANON_KEY }}

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref "$STAGING_SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to staging
        run: supabase db push --linked --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}

      - name: Deploy staging-only functions
        run: |
          supabase functions deploy seed-staging-fakes --project-ref "$STAGING_SUPABASE_PROJECT_REF" --no-verify-jwt
          supabase functions deploy staging-fake-login --project-ref "$STAGING_SUPABASE_PROJECT_REF" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          STAGING_SUPABASE_PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}

      - name: Re-seed staging with fake data
        if: ${{ github.event_name == 'push' || inputs.reseed }}
        run: |
          curl -fsS -X POST "$STAGING_SEED_FUNCTION_URL" \
            -H "Authorization: Bearer $STAGING_ANON_KEY" \
            -H "x-seed-token: $STAGING_SEED_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' | tee /tmp/seed-result.json
          jq -e '.ok == true' /tmp/seed-result.json
        env:
          STAGING_SEED_FUNCTION_URL: ${{ secrets.STAGING_SEED_FUNCTION_URL }}
          STAGING_SEED_TOKEN: ${{ secrets.STAGING_SEED_TOKEN }}
          STAGING_ANON_KEY: ${{ secrets.STAGING_ANON_KEY }}
