name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_qa:
        description: "Skip QA tests and deploy directly"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref vpexxhfpvghlejljwpvt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  qa:
    name: QA – Smoke & Visual Regression
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skip_qa != 'true' }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start preview server
        run: npx vite preview --port 8080 &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null && break || sleep 2
          done

      - name: Generate baseline snapshots if missing
        run: npx playwright test --project=chromium --update-snapshots
        env:
          BASE_URL: http://localhost:8080
          CI: true
          CI_AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:8080
          CI: true
          CI_AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: test-results/
          retention-days: 14

      - name: Upload updated snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: updated-snapshots
          path: e2e/**/*-snapshots/
          retention-days: 14

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, qa]
    if: ${{ always() && needs.build.result == 'success' && (needs.qa.result == 'success' || needs.qa.result == 'skipped') }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
