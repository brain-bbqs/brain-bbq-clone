name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Claude's git ops work

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # optional: claude_args: '--mode tag'
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
