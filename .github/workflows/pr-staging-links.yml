name: PR preview link

# Posts (and keeps updated) a single sticky comment on every PR with the
# Lovable preview URL for the branch. Behaves like rossjrw/pr-preview-action's
# comment, but for Lovable's hosted preview.
#
# Configure this repo variable (Settings → Secrets and variables → Actions
# → Variables):
#
#   LOVABLE_PROJECT_ID  e.g. 58213f9f-90d3-4c33-a079-dc28eec35ff7

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: pr-staging-links-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert sticky preview-link comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lovable-preview
          message: |
            ### 🚀 Lovable preview

            ${{ vars.LOVABLE_PROJECT_ID && format('Open this branch in Lovable: {0}', format('https://id-preview--{0}.lovable.app', vars.LOVABLE_PROJECT_ID)) || '_Set the `LOVABLE_PROJECT_ID` repo variable to enable this link._' }}

            <sub>Updated automatically by `.github/workflows/pr-staging-links.yml` on every push to this PR.</sub>

  status:
    runs-on: ubuntu-latest
    steps:
      - name: Publish Lovable preview as a status check
        uses: Sibz/github-status-action@v1
        continue-on-error: true
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: 'lovable / preview'
          description: 'Click "Details" to open the Lovable preview'
          state: 'success'
          sha: ${{ github.event.pull_request.head.sha }}
          target_url: ${{ vars.LOVABLE_PROJECT_ID && format('https://id-preview--{0}.lovable.app', vars.LOVABLE_PROJECT_ID) || format('https://github.com/{0}', github.repository) }}