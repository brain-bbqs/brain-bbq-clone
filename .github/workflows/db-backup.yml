# Scheduled full-database backup for the BBQS Knowledge Graph (Supabase project vpexxhfpvghlejljwpvt).
#
# Runs every Sunday at 02:00 UTC and can be triggered manually at any time.
# Dumps are pushed as compressed files to the private brain-bbqs/bbqs-backups repo:
#   kg/YYYY-MM-DD-schema.sql.gz   — schema only (DDL, RLS, functions, triggers)
#   kg/YYYY-MM-DD-data.sql.gz     — full data dump (schema + all table rows)
#
# ── Required secrets (Settings → Secrets → Actions) ─────────────────────────
#   SUPABASE_KG_DB_URL
#     postgresql://postgres:[PASSWORD]@db.vpexxhfpvghlejljwpvt.supabase.co:5432/postgres
#   BACKUP_REPO_TOKEN
#     GitHub PAT with `repo` scope — used to push to brain-bbqs/bbqs-backups
# ────────────────────────────────────────────────────────────────────────────

name: Database Backup — BBQS Knowledge Graph

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual backup (optional)"
        required: false
        default: "manual"

jobs:
  backup:
    name: pg_dump → bbqs-backups
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Set timestamp
        id: ts
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Dump schema
        run: |
          pg_dump \
            "${{ secrets.SUPABASE_KG_DB_URL }}" \
            --schema-only \
            --no-owner \
            --no-acl \
            --format=plain \
            | gzip > kg-${{ steps.ts.outputs.DATE }}-schema.sql.gz

      - name: Dump full data
        run: |
          pg_dump \
            "${{ secrets.SUPABASE_KG_DB_URL }}" \
            --no-owner \
            --no-acl \
            --format=plain \
            | gzip > kg-${{ steps.ts.outputs.DATE }}-data.sql.gz

      - name: Report sizes
        run: |
          echo "Schema: $(du -sh kg-${{ steps.ts.outputs.DATE }}-schema.sql.gz | cut -f1)"
          echo "Data:   $(du -sh kg-${{ steps.ts.outputs.DATE }}-data.sql.gz | cut -f1)"

      - name: Push to bbqs-backups
        run: |
          git clone https://x-access-token:${{ secrets.BACKUP_REPO_TOKEN }}@github.com/brain-bbqs/bbqs-backups.git backup-repo
          mkdir -p backup-repo/kg
          cp kg-${{ steps.ts.outputs.DATE }}-schema.sql.gz backup-repo/kg/
          cp kg-${{ steps.ts.outputs.DATE }}-data.sql.gz backup-repo/kg/
          cd backup-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kg/
          git commit -m "backup: KG ${{ steps.ts.outputs.DATE }}"
          git push

      - name: Summary
        run: |
          echo "## KG Backup — ${{ steps.ts.outputs.DATE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| kg/${{ steps.ts.outputs.DATE }}-schema.sql.gz | $(du -sh kg-${{ steps.ts.outputs.DATE }}-schema.sql.gz | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kg/${{ steps.ts.outputs.DATE }}-data.sql.gz | $(du -sh kg-${{ steps.ts.outputs.DATE }}-data.sql.gz | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Stored in [brain-bbqs/bbqs-backups](https://github.com/brain-bbqs/bbqs-backups/tree/main/kg)." >> "$GITHUB_STEP_SUMMARY"
